# Configuration file containing the configuration for the BulkDGD
# model (untrained) with 'tgmm' latent space for Tutorial 3.

# Set the plain text file containing the list of genes included in the DGD model.
genes_txt_file: "custom_genes.txt"

# Set the dimensionality of the latent space.
latent_dim: 50

# Set the type of latent space to use.
latent_type: "tgmm"

# Set the options for the latent space (Gaussian mixture model).
latent_options:
  n_components: 10
  covariance_type: "tied_spherical"
  init_covariances: "eye"
  init_means: "maxdist"
  init_weights: "uniform"
  n_init: 1
  reg_covar: 1.0e-06
  tol: 0.0001

# Set the options for the decoder.
decoder_options:
  activations:
    - "relu"
    - "relu"
  dropout: 0.0
  n_units_hidden_layers:
    - 500
    - 8000
  output_module_name: "nb_feature_dispersion"
  output_module_options:
    activation: softplus
    r_init: 2
